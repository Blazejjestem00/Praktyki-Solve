<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maja - Strona testowa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-light">
  <script>
			function oblicz()
			{
			
				var x = Number(document.getElementById("liczba1").value);

				var y = Number(document.getElementById("liczba2").value);

				var z = document.getElementById("wyb").value;
				
				if(z=="d1")
				{
					document.getElementById("wynik").innerHTML=x+y;
				}
				else if(z=="d2")
				{
					document.getElementById("wynik").innerHTML=x-y;
					
				}		
				else if(z=="d3")
				{
					document.getElementById("wynik").innerHTML=x*y; 
				}	
				else if(z=="d4")
				{
					if(y!=0)
					{
						document.getElementById("wynik").innerHTML=x/y;
					}
					else
					{
						document.getElementById("wynik").innerHTML="blad";
					}
				}				
			}
        </script>
    </head>
    <body>
		<form>
			<table>
				<tr>
					
					<td><input type="text" id="liczba1"></td>
					<td><select id="wyb">
						<option value="d1">+</option>
						<option value="d2">-</option>
						<option value="d3">*</option>
						<option value="d4">/</option>					
					</select></td>
					
					<td><input type="text" id="liczba2"></td>
					<td>=</td>
					<td id="wynik"></td>
				</tr>	
				
				<tr><td colspan="5">
				<input type="button" value="Oblicz" onClick="oblicz()"></td></tr>

			</table>
		</form>
	
  </body>
</html>
